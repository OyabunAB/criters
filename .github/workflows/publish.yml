name: Publish

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Sonatype (release tags only)
        if: startsWith(github.ref, 'refs/tags/v') && secrets.OSSRH_USERNAME != null && secrets.OSSRH_PASSWORD != null && secrets.SIGNING_KEY_ID != null && secrets.SIGNING_PASSWORD != null
        run: ./gradlew publishSonatypePublicationToSonatypeRepository -PossrhUsername='${{ secrets.OSSRH_USERNAME }}' -PossrhPassword='${{ secrets.OSSRH_PASSWORD }}' -Psigning.keyId='${{ secrets.SIGNING_KEY_ID }}' -Psigning.password='${{ secrets.SIGNING_PASSWORD }}'
